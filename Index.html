<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Digitalización Challenge</title>

<style>
body {
    font-family: Arial;
    background: radial-gradient(circle, #001f3f, #000);
    color: white;
    text-align: center;
}

h1 {
    text-shadow: 0 0 15px cyan;
}

button {
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #00c3ff, #007bff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.correct { background: green !important; }
.wrong { background: red !important; }

#feedback {
    margin-top: 15px;
    min-height: 60px;
}

#timerBar {
    width: 80%;
    height: 20px;
    background: rgba(255,255,255,0.2);
    margin: 20px auto;
}

#time {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, lime, yellow, red);
}

#lives {
    font-size: 30px;
}
</style>
</head>

<body>

<h1>💻 Digitalización Challenge</h1>

<div id="lives">❤️❤️❤️</div>
<div id="timerBar"><div id="time"></div></div>

<h2 id="question"></h2>
<div id="answers"></div>
<div id="feedback"></div>

<h3 id="score"></h3>
<button id="restart" onclick="restartGame()" style="display:none;">Reiniciar</button>

<script>

const questions = [

{
question: "¿Qué sistema operativo usarías para un servidor por estabilidad?",
answers: ["Windows XP", "Linux", "Android", "iOS"],
correct: 1,
explanation: "Linux es más estable, seguro y configurable para servidores."
},

{
question: "¿Qué tipo de red usa cables físicos?",
answers: ["WiFi", "Bluetooth", "Ethernet", "4G"],
correct: 2,
explanation: "Ethernet es una red cableada más estable y rápida."
},

{
question: "Si un dispositivo no enciende, ¿qué haces primero?",
answers: ["Comprar otro", "Analizar componentes", "Golpearlo", "Ignorar"],
correct: 1,
explanation: "Siempre hay que analizar el problema antes de actuar."
},

{
question: "¿Qué herramienta sirve para editar imágenes?",
answers: ["Photoshop", "Excel", "Word", "Chrome"],
correct: 0,
explanation: "Photoshop permite crear y modificar imágenes."
},

{
question: "¿Qué formato es mejor para vídeo?",
answers: ["MP4", "TXT", "DOC", "PNG"],
correct: 0,
explanation: "MP4 es compatible con la mayoría de dispositivos."
},

{
question: "¿Qué lenguaje estructura páginas web?",
answers: ["Python", "HTML", "C++", "Java"],
correct: 1,
explanation: "HTML define la estructura de una web."
},

{
question: "¿Qué hace CSS?",
answers: ["Programa IA", "Diseña la web", "Crea virus", "Nada"],
correct: 1,
explanation: "CSS da estilo y diseño a las páginas web."
},

{
question: "¿Qué es Big Data?",
answers: ["Muchos datos analizados", "Un virus", "Un juego", "Una red"],
correct: 0,
explanation: "Big Data analiza grandes cantidades de datos."
},

{
question: "¿Qué es malware?",
answers: ["Software seguro", "Programa malicioso", "Juego", "Antivirus"],
correct: 1,
explanation: "Malware daña o roba información del sistema."
},

{
question: "¿Qué hacer ante ciberacoso?",
answers: ["Ignorar", "Denunciar y bloquear", "Responder insultando", "Nada"],
correct: 1,
explanation: "Siempre hay que denunciar y protegerse."
}

];

let current = 0;
let score = 0;
let lives = 3;
let timeLeft = 120;
let timer;

function loadQuestion() {
    const q = questions[current];
    document.getElementById("question").innerText = q.question;
    document.getElementById("feedback").innerText = "";

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.innerText = a;
        btn.onclick = () => checkAnswer(i, btn);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(i, btn) {
    const q = questions[current];
    const buttons = document.querySelectorAll("#answers button");

    if (i === q.correct) {
        score++;
        btn.classList.add("correct");
        document.getElementById("feedback").innerText = "✅ Correcto: " + q.explanation;
    } else {
        lives--;
        btn.classList.add("wrong");
        updateLives();
        document.getElementById("feedback").innerText = "❌ Incorrecto: " + q.explanation;
    }

    buttons.forEach(b => b.disabled = true);

    setTimeout(() => {
        if (lives === 0) return endGame(false);
        current++;
        if (current < questions.length) loadQuestion();
        else endGame(true);
    }, 2000);
}

function updateLives() {
    document.getElementById("lives").innerText = "❤️".repeat(lives);
}

function endGame(win) {
    clearInterval(timer);
    document.getElementById("question").innerText = win ? "🏆 ¡Has ganado!" : "💀 Has perdido";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("score").innerText = "Puntuación: " + score;
    document.getElementById("restart").style.display = "block";
}

function restartGame() {
    current = 0;
    score = 0;
    lives = 3;
    timeLeft = 120;

    document.getElementById("score").innerText = "";
    document.getElementById("restart").style.display = "none";

    updateLives();
    loadQuestion();
    startTimer();
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").style.width = (timeLeft / 120) * 100 + "%";
        if (timeLeft <= 0) endGame(false);
    }, 1000);
}

loadQuestion();
updateLives();
startTimer();

</script>

</body>
</html>
